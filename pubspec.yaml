name: campusconnect
description: CampusConnect recruiter-level Flutter + Firebase app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5
  firebase_analytics: ^11.4.5
  flutter_local_notifications: ^17.2.4
  provider: ^6.1.2
  flutter_bloc: ^8.1.6
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  connectivity_plus: ^7.1.1
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: web/icons/Icon-512.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#0175C2"
  image: web/icons/Icon-512.png
  android: true
  ios: false
  web: false
